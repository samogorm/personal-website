<div id="app-container" class="col-12">
    <div id="left-side" class="col-xl-6 col-lg-6 col-md-6 col-sm-12 col-xs-12">
      <div class="container">
        <div id="about-text" class="col-12">
          <app-image image="Pixel-Sam-Head.png" imageLabel="Pixelated version of Sam's head."></app-image>
            <h5>Hello, I'm Samantha O'Gorman.</h5>
          <h1>
            <span class="highlight-text">Full-Stack Developer</span> <br>
            &amp; <span class="highlight-text">UI Designer</span>.
          </h1>
          <h5>Based in Bolton, Manchester <span class="emoji-con">🇬🇧</span></h5>
          <app-button url="mailto:samogorm@gmail.com" label="Talk to me ⚡️"></app-button>
        </div>
        <app-social-icons></app-social-icons>
      </div>
    </div>
    <div id="right-side" class="col-xl-6 col-lg-6 col-md-6 col-sm-12 col-xs-12">
        <div class="container">
            <div id="intro" class="col-12">
                <h3>Intro</h3>
                <app-introduction></app-introduction>
            </div>
            <div id="skills" class="col-12">
                <h3>Skills</h3>
                <app-skill-list></app-skill-list>
            </div>
            <div id="education" class="col-12">
              <h3>Education</h3>
              <div *ngFor="let ed of education">
                  <app-work-education date="{{ed.date}}" location="{{ed.location}}" title="{{ed.title}}"></app-work-education>
              </div>
            </div>
            <div id="work" class="col-12">
                <h3>Work</h3>
                <div *ngFor="let work of workExperience">
                    <app-work-education date="{{work.date}}" location="{{work.location}}" title="{{work.title}}"></app-work-education>
                </div>
            </div>
            <div id="github" class="col-12 text-center">
              <p>Hosted on GitHub Pages <i class="fas fa-heart"></i></p>
            </div>
        </div>
    </div>
</div>
